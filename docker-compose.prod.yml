services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumenai
      POSTGRES_PASSWORD: lumenai
      POSTGRES_DB: lumenai
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    # If you have a run_api.sh that does migrations, you can swap this for: ["sh", "run_api.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - backend/.env
    depends_on:
      - db
    ports:
      - "18011:8000"
    restart: unless-stopped

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  db_data: